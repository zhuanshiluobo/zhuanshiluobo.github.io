name: Import issue post

on:
  issues:
    types: [opened, edited, labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to import
        required: true

permissions:
  contents: write
  issues: write

concurrency:
  group: import-issue-post
  cancel-in-progress: false

jobs:
  import:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.issue.labels.*.name, 'blog-post')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Read issue
        uses: actions/github-script@v7
        id: issue
        with:
          script: |
            const issue_number = Number(
              context.eventName === 'workflow_dispatch'
                ? core.getInput('issue_number')
                : context.payload.issue.number
            )
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number
            })
            core.setOutput('number', issue.number)
            core.setOutput('title', issue.title)
            core.setOutput('body', issue.body || '')
            core.setOutput('html_url', issue.html_url)

      - name: Import post
        env:
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          ISSUE_BODY: ${{ steps.issue.outputs.body }}
          ISSUE_URL: ${{ steps.issue.outputs.html_url }}
        run: node scripts/import-issue-post.mjs

      - run: npm run build

      - name: Commit post
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: master
          commit_message: "Import blog post from issue #${{ steps.issue.outputs.number }}"
          file_pattern: src/data/posts.js

      - name: Comment result
        if: github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: 'Imported this issue as a blog post. The Pages deploy workflow will publish it after the commit lands.'
            })
